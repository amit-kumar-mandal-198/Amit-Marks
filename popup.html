<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quick Save Bookmark</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <h2>Save to MyMarks</h2>
    
    <div class="site-info">
      <img id="site-favicon" src="icon16.png" alt="favicon">
      <div class="site-details">
        <input type="text" id="site-title" class="input-field" placeholder="Title">
        <input type="text" id="site-url" class="input-field url-field" readonly>
      </div>
    </div>

    <div class="selectors">
      <div class="form-group">
        <label for="page-select">Page</label>
        <select id="page-select" class="select-field"></select>
      </div>
      <div class="form-group">
        <label for="board-select">Board</label>
        <select id="board-select" class="select-field"></select>
      </div>
    </div>

    <div class="actions">
      <button id="cancel-btn" class="btn btn-outline">Cancel</button>
      <button id="save-btn" class="btn btn-primary">Save Bookmark</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
